databases:
  - name: atm-postgres
    databaseName: ai_talent_marketplace
    user: atm_admin
    plan: starter

services:
  - type: web
    name: atm-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run db:generate --workspace @atm/db && npm run build --workspace @atm/api
    startCommand: npm run start --workspace @atm/api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atm-postgres
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: atm-postgres
          property: connectionString
      - key: AI_ENGINE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_GRAPHQL_API_URL
        sync: false
      - key: EXPO_PUBLIC_GRAPHQL_API_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: gpt-4o-mini
      - key: OPENROUTER_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: RESEND_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false

  - type: web
    name: atm-ai-engine
    runtime: python
    plan: starter
    rootDir: services/ai-engine
    buildCommand: pip install -e .
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atm-postgres
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: atm-postgres
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: gpt-4o-mini
      - key: OPENROUTER_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: INTERNAL_API_KEY
        sync: false