name: CI

on:
  push:
    branches: [main, 1-with-UI-scaffolding]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: TypeScript Check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: TypeScript check (API)
        run: npx tsc --noEmit --project apps/api/tsconfig.json

      - name: Build web app
        run: npm run build --workspace @atm/web
        env:
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_GRAPHQL_API_URL: http://localhost:4000/graphql

  ai-engine-check:
    name: AI Engine Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AI engine dependencies
        working-directory: services/ai-engine
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Check Python syntax
        working-directory: services/ai-engine
        run: python -m py_compile app/main.py && python -m py_compile app/models.py
